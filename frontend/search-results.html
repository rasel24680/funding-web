<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Funding Results - Funding Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-link">
                <img src="assets/logo.png" alt="Pellopay" class="logo-img">
            </a>
            <div class="nav-menu">
                <a href="#loans" class="nav-link">Loans</a>
                <a href="#guides" class="nav-link">Guides</a>
                <a href="#contact" class="nav-link">Contact</a>
                <a href="#blog" class="nav-link">Blog</a>
            </div>
            <div class="nav-actions">
                <a href="funding-form.html" class="find-funding-btn">Find Funding</a>
                
                <!-- User Profile Dropdown -->
                <div class="user-profile-dropdown" id="userProfileDropdown" style="display: none;">
                    <div class="user-profile-header">
                        <span class="company-name" id="companyNameDisplay"></span>
                        <svg class="dropdown-arrow" width="12" height="8" viewBox="0 0 12 8" fill="none">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="user-dropdown-menu" id="userDropdownMenu">
                        <a href="dashboard.html" class="dropdown-item dashboard-link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <path d="M9 11h6v6H9z"/>
                                <path d="M3 9h18M9 3v6"/>
                            </svg>
                            Dashboard
                        </a>
                        <a href="search-results.html" class="dropdown-item search-link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            Search
                        </a>
                        <a href="documents.html" class="dropdown-item documents-link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                                <polyline points="13 2 13 9 20 9"/>
                            </svg>
                            Documents
                        </a>
                        <a href="admin.html" class="dropdown-item admin-link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="1"/>
                                <path d="M12 1v6m0 6v6"/>
                                <path d="M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6"/>
                            </svg>
                            Admin
                        </a>
                        <hr class="dropdown-divider">
                        <a href="#logout" class="dropdown-item logout-link" id="logoutBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 4l4 4m0 0l-4 4m4-4H9m7 8v-2"/>
                            </svg>
                            Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Phone Verification Modal -->
    <div class="phone-verification-modal" id="phoneVerificationModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Verify Your Phone Number</h2>
                <button class="modal-close" id="closeModalBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-description">We need to verify your phone number to show you available funding options.</p>
                
                <div class="phone-input-group">
                    <label for="phoneNumber">Phone Number</label>
                    <div class="phone-input-wrapper">
                        <span class="country-code">+44</span>
                        <input 
                            type="tel" 
                            id="phoneNumber" 
                            placeholder="20 8123 2841"
                            maxlength="15"
                        >
                    </div>
                    <p class="phone-hint">Enter your UK phone number (without the country code)</p>
                </div>

                <div class="modal-message" id="verificationMessage"></div>

                <div class="modal-actions">
                    <button class="btn-close-modal" id="skipVerificationBtn">Skip for now</button>
                    <button class="btn-verify" id="verifyPhoneBtn">Verify Phone</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Search Results Section -->
    <section class="search-results-section">
        <div class="search-results-header">
            <div class="results-info">
                <h1>We've found <span id="funderCount">10</span> funders.</h1>
                <button class="edit-search-btn" id="editSearchBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L21 3z"></path>
                    </svg>
                    Edit search
                </button>
            </div>
            <div class="sort-controls">
                <label for="sortSelect">Sort:</label>
                <select id="sortSelect" class="sort-select">
                    <option value="lowest-rates">Lowest Rates</option>
                    <option value="highest-amount">Highest Amount</option>
                    <option value="fastest-approval">Fastest Approval</option>
                    <option value="most-recent">Most Recent</option>
                </select>
            </div>
        </div>

        <!-- Funding Cards Container -->
        <div class="funding-cards-container" id="fundingCardsContainer">
            <!-- Cards will be generated by JavaScript -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
