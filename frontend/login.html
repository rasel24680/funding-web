<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up - Pellopay</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-link">
                <img src="assets/logo.png" alt="Pellopay" class="logo-img">
            </a>
            <div class="nav-menu">
                <a href="#loans" class="nav-link">Loans</a>
                <a href="#guides" class="nav-link">Guides</a>
                <a href="#contact" class="nav-link">Contact</a>
                <a href="#blog" class="nav-link">Blog</a>
            </div>
            <div class="nav-actions">
                <a href="funding-form.html" class="find-funding-btn">Find Funding</a>
            </div>
        </div>
    </nav>

    <!-- Login & Sign Up Container -->
    <section class="auth-section-new">
        <!-- Left Side - Banner Image -->
        <div class="auth-left">
            <img src="assets/banner.png" alt="Pellopay - Find the Right Funder" class="auth-banner-image">
        </div>

        <!-- Right Side - Form Section -->
        <div class="auth-right">
            <div class="form-container">

                <!-- Login Form -->
                <form id="loginForm" class="auth-form-new active">
                    <h2 class="form-title">Sign In</h2>

                    <div class="form-group-new">
                        <label for="loginEmail" class="form-label-new">Email Address</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            name="email" 
                            placeholder="your@email.com"
                            required
                        >
                    </div>

                    <div class="form-group-new">
                        <label for="loginPassword" class="form-label-new">Password</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        >
                        <a href="#" class="forgot-password-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="auth-continue-button">
                        <span>CONTINUE</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>

                    <!-- Social Login -->
                    <div class="social-divider">
                        <span>or Connect with Social Media</span>
                    </div>

                    <div class="social-buttons">
                        <button type="button" class="social-btn twitter-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2s9 5 20 5a9.5 9.5 0 00-9-5.5c4.75 2.25 7-7 7-7"/>
                            </svg>
                            <span>Sign in With Twitter</span>
                        </button>

                        <button type="button" class="social-btn facebook-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18 2h-3a6 6 0 00-6 6v3H7v4h2v8h4v-8h3l1-4h-4V8a2 2 0 012-2h3z"/>
                            </svg>
                            <span>Sign in With Facebook</span>
                        </button>
                    </div>
                </form>

                <!-- Sign Up Form -->
                <form id="signupForm" class="auth-form-new">
                    <h2 class="form-title">Create Account</h2>

                    <div class="form-row-new">
                        <div class="form-group-new">
                            <label for="firstName" class="form-label-new">First Name</label>
                            <input 
                                type="text" 
                                id="firstName" 
                                name="firstName" 
                                placeholder="John"
                                required
                            >
                        </div>
                        <div class="form-group-new">
                            <label for="lastName" class="form-label-new">Last Name</label>
                            <input 
                                type="text" 
                                id="lastName" 
                                name="lastName" 
                                placeholder="Doe"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group-new">
                        <label for="signupEmail" class="form-label-new">Email Address</label>
                        <input 
                            type="email" 
                            id="signupEmail" 
                            name="email" 
                            placeholder="your@email.com"
                            required
                        >
                    </div>

                    <div class="form-group-new">
                        <label for="signupPassword" class="form-label-new">Password</label>
                        <input 
                            type="password" 
                            id="signupPassword" 
                            name="password" 
                            placeholder="Create a strong password"
                            required
                        >
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                    </div>

                    <div class="form-group-new">
                        <label for="confirmPassword" class="form-label-new">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirm your password"
                            required
                        >
                    </div>

                    <div class="form-group-new">
                        <label for="companyName" class="form-label-new">Company Name</label>
                        <input 
                            type="text" 
                            id="companyName" 
                            name="companyName" 
                            placeholder="Your company name"
                            required
                        >
                    </div>

                    <div class="form-group-new checkbox-new">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <label for="agreeTerms">I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a></label>
                    </div>

                    <button type="submit" class="auth-continue-button">
                        <span>CREATE ACCOUNT</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </form>

                <!-- Tab Toggle for Sign Up -->
                <div class="auth-toggle">
                    <p>Don't have an account? <button type="button" class="toggle-btn" data-toggle="signup">Sign Up</button></p>
                    <p style="display: none;">Already have an account? <button type="button" class="toggle-btn" data-toggle="login">Sign In</button></p>
                </div>

                <!-- Authentication Message -->
                <div class="auth-message" id="authMessage"></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
